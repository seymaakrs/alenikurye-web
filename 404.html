<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sayfa bulunamadı — Aleni Kurye</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta http-equiv="refresh" content="3; url=/" />
<style>
  :root{--bordo:#780000;--bg:#fefefe;--ink:#1a1a1a;--muted:#777}
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter','Helvetica Neue',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;text-align:center;
  }
  .wrap{max-width:520px}
  h1{font-size:clamp(48px,8vw,96px);color:var(--bordo);font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
  h2{font-size:clamp(20px,3vw,28px);margin-bottom:14px;font-weight:600}
  p{color:var(--muted);font-size:16px;line-height:1.6;margin-bottom:28px}
  a.btn{
    display:inline-block;background:var(--bordo);color:#fff;
    padding:14px 28px;border-radius:999px;text-decoration:none;
    font-weight:600;font-size:14px;transition:.25s;
  }
  a.btn:hover{background:#5a0000}
  .small{font-size:13px;color:var(--muted);margin-top:18px}
</style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <h2>Aradığınız sayfa bulunamadı</h2>
    <p>Bu link kırık olabilir veya sayfa taşınmış olabilir. 3 saniye içinde anasayfaya yönlendirileceksiniz.</p>
    <a href="/" class="btn">Anasayfaya Dön</a>
    <p class="small">7/24 sipariş için: <a href="tel:+905527161968" style="color:var(--bordo)">0552 716 19 68</a></p>
  </div>
</body>
</html>
